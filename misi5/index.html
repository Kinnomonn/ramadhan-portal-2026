<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Imsakiyah</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-500 min-h-screen flex flex-col">
  <header class="bg-emerald-800/60 text-stone-50 p-4 shadow-2xl">
    <nav class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
      <h1 class="text-xl md:text-3xl text-stone-50 font-bold text-center">🗓️ Jadwal Imsakiyah</h1>

      <ul class="max-w-6xl flex justify-between items-center gap-4 px-5 py-3 rounded-xl text-sm font-medium">
        <li><a href="/misi4/index.html"><button class="text-sm md:text-base px-2 md:px-4 py-2 bg-emerald-700 text-stone-50 rounded-lg shadow-sm shadow-black hover:bg-stone-50 hover:text-emerald-700 transition-all duration-500 ease-in-out">To do List</button></a></li>
        <li><a href="/misi3/index.html"><button class="text-sm md:text-base px-2 md:px-4 py-2 bg-emerald-700 text-stone-50 rounded-lg shadow-sm shadow-black hover:bg-stone-50 hover:text-emerald-700 transition-all duration-500 ease-in-out">Bayar Zakat</button></a></li>
        <li><a href="/misi1/index.html"><button class="text-sm md:text-base px-2 md:px-4 py-2 bg-emerald-700 text-stone-50 rounded-lg shadow-sm shadow-black hover:bg-stone-50 hover:text-emerald-700 transition-all duration-500 ease-in-out">Doa Ramadan</button></a></li>
      </ul>
    </nav>
  </header>

  <div id="loading" class="hidden flex flex-col justify-center items-center fixed inset-0 bg-emerald-900/60 backdrop-blur-sm z-50">
    <div class="w-24 h-24 border-4 border-stone-50 rounded-full animate-spin">.....</div>
    <p class="animate-pulse text-stone-50 font-medium mt-4 uppercase">Loading</p>
  </div>

  <div id="error" class="hidden flex flex-col justify-center items-center fixed inset-0 bg-red-800/50 backdrop-blur-sm z-50">
    <div class="">
      <span class="text-8xl">⚠️</span>
    </div>

    <button onclick="location.reload()" class="px-12 py-3 bg-red-900 text-stone-50 font-bold rounded-xl hover:bg-stone-50 hover:text-red-900 transition-all duration-500 active:scale-95 shadow-lg mt-8">
    Coba Lagi
  </button>
  </div>

  <main class="max-w-6xl mx-auto p-4 md:p-6 flex-grow w-full">

    <section class="mt-4 md:mt-8 bg-stone-100 p-6 rounded-2xl">
      <label for="kota" class="text-start block text-sm font-semibold text-emerald-900 mb-2">Pilih Kota</label>
      <select id="kota" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
        <!-- <option value="">Bandung</option>
        <option value="">Cirebon</option> -->
      </select>
    </section>

    <section class="bg-stone-100 rounded-2xl rounded-2xl shadow-2xl mt-4 md:mt-8 p-4 overflow-x-auto">
      <table class="w-full text-left min-w-[700px]">
        <thead class="text-sm md:text-base">
          <tr class="text-emerald-900 bg-stone-100 shadow-2xl">
            <th class="p-2 md:p-4 text-center capitalize">tanggal</th>
            <th class="p-2 md:p-4 text-center capitalize">imsak</th>
            <th class="p-2 md:p-4 text-center capitalize">subuh</th>
            <th class="p-2 md:p-4 text-center capitalize">dzuhur</th>
            <th class="p-2 md:p-4 text-center capitalize">ashar</th>
            <th class="p-2 md:p-4 text-center capitalize">maghrib</th>
            <th class="p-2 md:p-4 text-center capitalize">isya</th>
          </tr>
        </thead>
        <tbody id="tabel-jadwal" class="text-emerald-900 font-medium text-sm md:text-base">
          
        </tbody>
      </table>
    </section>
  </main>

  <footer class="mt-auto bg-emerald-800/60 w-full p-6 text-center text-stone-50 text-sm shadow-2xl">
    <p>Selamat Menunaikan Ibadah Puasa</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
