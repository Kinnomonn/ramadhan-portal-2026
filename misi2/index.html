<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berdzikir</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col justify-between items-center bg-stone-50 min-h-screen">
  <header class="mt-8">
    <h1 class="text-3xl md:text-5xl text-center font-bold text-emerald-800">Mari Berdzikir</h1>
    <p class="text-xs md:text-base text-center text-emerald-800">Alat penghitung dzikir yang bisa digunakan kapan saja!</p>
    <p class="text-xs md:text-base text-center text-emerald-800">Ayo berdzikir hingga <strong>100</strong> kali!</p>
  </header>

  <div id="notifikasi" class="h-8 mt-6 text-emerald-800 text-sm md:text-lg animate-pulse font-bold text-center">
  </div>

  <main class="bg-emerald-950 flex flex-col justify-center items-center px-16 py-16 rounded-full gap-6 w-[280px] h-[280px] md:w-auto md:h-auto">

    <section class="">
      <h2 id="angka" class="text-7xl md:text-8xl text-stone-50 font-bold transition-all duration-100">0</h2>
    </section>

    <section class="flex justify-center items-center mt-6 gap-6">
      <button id="tombol-reset" class="text-center bg-stone-50 text-base md:text-xl px-6 py-2 rounded-xl text-emerald-800 active:scale-95 transition-all duration-300 hover:bg-red-900 hover:text-stone-50">Reset</button>

      <button id="tombol-tambah" class="text-center bg-stone-50 text-base md:text-xl px-8 py-2 rounded-xl text-emerald-800 active:scale-95 transition-all duration-300 hover:bg-emerald-800 hover:text-stone-50">+</button>
    </section>
  </main>

  <footer class="mt-12 bg-emerald-950 text-xs md:text-sm size-full w-full p-4 text-center text-stone-50">
    <p>Selamat Menunaikan Ibadah Puasa</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
