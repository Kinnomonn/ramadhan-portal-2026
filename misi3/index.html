<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Zakat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col justify-center items-center gap-12 bg-white">
  <header class="p-8 text-center max-w-2xl">
    <h1 class="text-3xl font-bold text-emerald-800">Kalkulator Zakat</h1>
    <p class="text-stone-600 mt-2">Permudah perhitungan zakat Anda sesuai ketetapan syariah.</p>
  </header>

  <main class="w-full md:max-w-5xl max-w-lg p-6 bg-white rounded-3xl shadow-2xl border border-stone-200 mb-12">
    <div class="mb-6">
      <label for="jenis-zakat" class="block text-sm font-semibold text-emerald-800 mb-2">Pilih Jenis Zakat</label>
      <select id="jenis-zakat" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
        <option value="penghasilan">Zakat Penghasilan</option>
        <option value="emas">Zakat Emas</option>
      </select>
    </div>

    <div class="mb-6">
      <label for="harga-emas" class="block text-sm font-semibold text-emerald-800 mb-2">Harga Emas Saat Ini (per gram)</label>
      <input type="number" id="harga-emas" placeholder="Contoh: 1200000" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
    </div>

    <div id="form-penghasilan" class="space-y-4">
      <div>
        <label for="gaji" class="block text-sm font-semibold text-emerald-800 mb-2">Gaji Per Bulan</label>
        <input type="number" id="gaji" placeholder="0" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
      </div>
      <div>
        <label for="lainnya" class="block text-sm font-semibold text-emerald-800 mb-2">Penghasilan Lainnya</label>
        <input type="number" id="lainnya" placeholder="0" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
      </div>
    </div>

    <div id="form-emas" class="hidden space-y-4">
      <div>
        <label for="total-emas" class="block text-sm font-semibold text-emerald-800 mb-2">Total Emas (gram)</label>
        <input type="number" id="total-emas" placeholder="0" class="w-full p-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-emerald-500 outline-none">
      </div>
    </div>

    <button id="btn-hitung" class="w-full mt-8 bg-emerald-700 text-white font-bold py-4 rounded-xl hover:bg-emerald-600 transition-all active:scale-90">
      Hitung Zakat
    </button>

    <section id="hasil" class="mt-8 p-6 bg-emerald-900 rounded-2xl border border-emerald-100">
      <h2 class="text-lg font-bold text-white mb-4 text-center">Hasil Perhitungan</h2>
      <div class="space-y-2 text-sm text-white">
        <div class="flex justify-between">
          <span>Total Harta:</span> 
          <span id="res-total" class="font-bold">Rp 0</span>
        </div>

        <div class="flex justify-between">
          <span>Nilai Nisab:</span> 
          <span id="res-nisab" class="font-bold">Rp 0</span>
        </div>

        <div class="flex justify-between">
          <span>Status:</span> 
          <span id="res-status" class="font-bold uppercase text-red-700">Tidak Wajib</span>
        </div>

        <hr class="border-emerald-200 my-2">
        <div class="flex justify-between text-base font-bold">
          <span>Zakat Dibayar:</span> 
          <span id="res-zakat">Rp 0</span>
        </div>

      </div>
    </section>
  </main>

  <footer class="mt-auto bg-emerald-950 w-full p-6 text-center text-stone-50 text-sm">
    <p>Selamat Menunaikan Ibadah Puasa</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
